name: Bot Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: trusty
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: trusty
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            binary: trusty

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Build release binary
        run: |
          cargo build --release --target ${{ matrix.target }} \
            --package trusty-cli \
            --package trusty-daemon \
            --package trusty-telegram \
            --package trusty-api

      - name: Package binaries
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="trusty-izzie-${TAG}-${{ matrix.target }}.tar.gz"
          mkdir -p dist
          cp target/${{ matrix.target }}/release/trusty dist/
          cp target/${{ matrix.target }}/release/trusty-daemon dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/trusty-telegram dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/trusty-api dist/ 2>/dev/null || true
          cp .env.example dist/
          cp -r scripts dist/
          tar -czf "${ARCHIVE}" -C dist .
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
          generate_release_notes: true
