# Pre-commit hooks for trusty-izzie (Rust workspace)
# See https://pre-commit.com for more information

repos:
  # Standard file hygiene hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(.*\.md|.*\.txt)$
      - id: end-of-file-fixer
        exclude: ^(.*\.md|.*\.txt)$
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=5000']   # ONNX model downloads are large; don't commit them
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Rust formatting — enforces rustfmt on every staged .rs file
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        description: Format Rust code with rustfmt
        entry: cargo fmt --all --
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-check
        name: cargo check
        description: Verify the workspace compiles without errors
        entry: cargo check --workspace --all-targets
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        description: Lint Rust code; fail on warnings
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

  # Secret detection — catches API keys, tokens, private keys before they land in git
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: |
          (?x)^(
            target/.*|
            \.git/.*|
            .*\.lock|
            Cargo\.lock
          )$

  # Conventional commits enforcement
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.2.1
    hooks:
      - id: commitizen
        stages: [commit-msg]

# Global settings
default_stages: [pre-commit]
fail_fast: false

exclude: |
  (?x)^(
    target/.*|
    \.git/.*|
    \.fastembed_cache/.*|
    \.local/.*
  )$
